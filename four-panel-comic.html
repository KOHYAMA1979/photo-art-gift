<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>4コマ漫画制作 | KOHYAMA AI Creative</title>
  <meta name="description" content="4コマ漫画制作の料金、サンプル、用途、制作の流れを紹介する詳細ページ。">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      background: #eaf5ff;
    }

    body {
      min-width: 320px;
      background:
        linear-gradient(90deg, rgba(22, 105, 210, 0.08) 1px, transparent 1px),
        #eaf5ff;
      background-size: 24px 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans JP", sans-serif;
    }

    .page {
      width: min(100%, 860px);
      margin: 0 auto;
      background: #ffffff;
      box-shadow: 0 18px 60px rgba(6, 32, 72, 0.18);
    }

    .detail-image {
      display: block;
      width: 100%;
      height: auto;
    }

    .revision-note {
      margin: 0 auto;
      padding: 20px 24px 24px;
      background: #ffffff;
      color: #0b1b33;
      font-weight: 700;
      line-height: 1.7;
      text-align: center;
    }

    .revision-note b {
      display: block;
      margin-bottom: 4px;
      color: #0f64d2;
      font-size: 1.02rem;
    }

    .revision-note span {
      color: #d6001c;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main class="page">
    <img class="detail-image" src="assets/four-panel-comic-detail.png" alt="4コマ漫画制作の料金とサンプル">
    <section class="revision-note" aria-label="修正対応について">
      <b>修正対応について</b>
      デザイン案の確認後、軽微な修正は<span>2回まで無料</span>で対応します。3回目以降の修正は、内容に応じて別途費用がかかります。
    </section>
  </main>
</body>
</html>
